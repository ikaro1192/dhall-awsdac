name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # Keep DHALL_VERSION in sync with release.yml.
  DHALL_VERSION: 1.42.2
  # dhall-yaml is versioned independently of dhall; see the asset list at
  # https://github.com/dhall-lang/dhall-haskell/releases for the latest pairing.
  DHALL_YAML_VERSION: 1.2.12
  # awslabs/diagram-as-code revision used to build awsdac for round-trip tests.
  # README recommends submodule HEAD; pin a commit here when reproducibility matters.
  AWSDAC_REF: main

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dhall
        run: |
          curl -fsSL "https://github.com/dhall-lang/dhall-haskell/releases/download/${DHALL_VERSION}/dhall-${DHALL_VERSION}-x86_64-linux.tar.bz2" \
            | sudo tar -xj -C /usr/local

      - name: dhall type
        run: dhall type --file package.dhall > /dev/null

      - name: dhall hash
        run: dhall hash --file package.dhall

  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dhall + dhall-yaml
        run: |
          curl -fsSL "https://github.com/dhall-lang/dhall-haskell/releases/download/${DHALL_VERSION}/dhall-${DHALL_VERSION}-x86_64-linux.tar.bz2" \
            | sudo tar -xj -C /usr/local
          curl -fsSL "https://github.com/dhall-lang/dhall-haskell/releases/download/${DHALL_VERSION}/dhall-yaml-${DHALL_YAML_VERSION}-x86_64-linux.tar.bz2" \
            | sudo tar -xj -C /usr/local

      - name: Checkout diagram-as-code
        run: |
          git clone https://github.com/awslabs/diagram-as-code.git
          git -C diagram-as-code checkout "${AWSDAC_REF}"

      - uses: actions/setup-go@v5
        with:
          go-version-file: diagram-as-code/go.mod
          cache-dependency-path: diagram-as-code/go.sum

      - name: Build awsdac
        working-directory: diagram-as-code
        run: go build -o "${RUNNER_TEMP}/awsdac" ./cmd/awsdac

      - name: Round-trip tests
        env:
          AWSDAC: ${{ runner.temp }}/awsdac
        run: bash test/render.sh
